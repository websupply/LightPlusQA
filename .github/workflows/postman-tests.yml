name: Pedido Catalogo API Tests

on:
  push:
    branches: [ main ]

jobs:

  smoke:
    name: Pedido Catalogo - Smoke
    runs-on: ubuntu-latest
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "SMOKE" \
            --reporters cli

  validation:
    name: Pedido Catalogo - Validation
    runs-on: ubuntu-latest
    needs: smoke
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "VALIDATION" \
            --reporters cli

  business:
    name: Pedido Catalogo - Business Rule
    runs-on: ubuntu-latest
    needs: validation
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "BUSINESS_RULE" \
            --reporters cli

  alteracao:
    name: Pedido Catalogo - Alteracao
    runs-on: ubuntu-latest
    needs: business
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "ALTERACAO" \
            --reporters cli

  dashboard:
    name: Gerar Dashboard
    runs-on: ubuntu-latest
    needs: [smoke, validation, business, alteracao]
    if: always()
    permissions:
      contents: write
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          npm install -g newman
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Rodar testes consolidados
        run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --reporters cli,json \
            --reporter-json-export report.json
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Criar estrutura
        run: mkdir -p public/$DATE

      - name: Gerar details.json
        run: |
          jq '{
            summary: .run.stats,
            failures: .run.failures,
            executions: .run.executions
          }' report.json > public/$DATE/details.json

      - name: Atualizar history.json
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATE\",
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS
          }]" $FILE > tmp.json && mv tmp.json $FILE

      - name: Criar index.html
        run: |
          echo "<!DOCTYPE html>" > public/index.html
          echo "<html><head>" >> public/index.html
          echo "<meta charset='UTF-8'>" >> public/index.html
          echo "<title>Pedido Catálogo Dashboard</title>" >> public/index.html
          echo "<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>" >> public/index.html
          echo "<style>" >> public/index.html
          echo "body{background:#111;color:#eee;font-family:Arial;padding:40px}" >> public/index.html
          echo ".card{padding:15px;margin:10px 0;border-radius:8px}" >> public/index.html
          echo ".ok{background:#1e4620}" >> public/index.html
          echo ".warn{background:#5a4b00}" >> public/index.html
          echo ".fail{background:#5a0000}" >> public/index.html
          echo "</style></head><body>" >> public/index.html
          echo "<h1>Pedido Catálogo - Histórico</h1>" >> public/index.html
          echo "<div id='cards'></div>" >> public/index.html
          echo "<canvas id='chart' height='100'></canvas>" >> public/index.html

          echo "<script>
          fetch('history.json')
          .then(r=>r.json())
          .then(data=>{
          data.reverse();
          let html='';
          let labels=[];
          let success=[];
          data.forEach(run=>{
          let cls='ok';
          if(run.failed>0) cls='fail';
          else if(run.success<100) cls='warn';

          html+=\`
          <div class='card \${cls}'>
          <strong>\${run.date}</strong><br>
          Total: \${run.total} |
          Passed: \${run.passed} |
          Failed: \${run.failed} |
          Success: \${run.success}%
          </div>\`;
          labels.push(run.date);
          success.push(run.success);
          });
          document.getElementById('cards').innerHTML=html;

          new Chart(document.getElementById('chart'),{
          type:'line',
          data:{
          labels:labels,
          datasets:[{
          label:'Taxa de Sucesso (%)',
          data:success,
          borderColor:'#4CAF50',
          fill:false
          }]
          }
          });
          });
          </script>" >> public/index.html

          echo "</body></html>" >> public/index.html

      - name: Verificar arquivos antes do deploy
        run: |
          echo "Conteúdo da pasta public:"
          ls -la public

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages