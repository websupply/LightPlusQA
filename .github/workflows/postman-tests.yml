name: Pedido Catalogo API Tests

on:
  push:
    branches: [ main ]

jobs:

  smoke:
    name: Pedido Catalogo - Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Smoke Tests
        run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "SMOKE" \
          --reporters cli

  validation:
    name: Pedido Catalogo - Validation
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Validation Tests
        run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "VALIDATION" \
          --reporters cli

  business:
    name: Pedido Catalogo - Business Rule
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Business Tests
        run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "BUSINESS_RULE" \
          --reporters cli

  alteracao:
    name: Pedido Catalogo - Alteracao
    runs-on: ubuntu-latest
    needs: business

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Alteracao Tests
        run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "ALTERACAO" \
          --reporters cli