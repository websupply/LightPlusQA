name: Pedido Catalogo API Tests

on:
  push:
    branches: [ main ]

jobs:

  smoke:
    name: Pedido Catalogo - Smoke
    runs-on: ubuntu-latest
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "SMOKE" \
            --reporters cli

  validation:
    name: Pedido Catalogo - Validation
    runs-on: ubuntu-latest
    needs: smoke
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "VALIDATION" \
            --reporters cli

  business:
    name: Pedido Catalogo - Business Rule
    runs-on: ubuntu-latest
    needs: validation
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "BUSINESS_RULE" \
            --reporters cli

  alteracao:
    name: Pedido Catalogo - Alteracao
    runs-on: ubuntu-latest
    needs: business
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --folder "ALTERACAO" \
            --reporters cli

  dashboard:
    name: Gerar Dashboard
    runs-on: ubuntu-latest
    needs: [smoke, validation, business, alteracao]
    if: always()
    permissions:
      contents: write
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          npm install -g newman
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Rodar testes consolidados
        run: |
          newman run api-v1.0.postman_collection.json \
            -e HOM.postman_environment.json \
            --env-var vUsuario=$VUSUARIO \
            --env-var vSenha=$VSENHA \
            --folder "02-PEDIDO_CATALOGO" \
            --reporters cli,json \
            --reporter-json-export report.json
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Criar estrutura
        run: mkdir -p public/$DATE

      - name: Gerar details.json
        run: |
          jq '{
            summary: .run.stats,
            failures: .run.failures,
            executions: .run.executions
          }' report.json > public/$DATE/details.json

      - name: Atualizar history.json
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATE\",
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS
          }]" $FILE > tmp.json && mv tmp.json $FILE

      - name: Criar index.html profissional
        run: |
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
              <meta charset="UTF-8">
              <title>API Quality Dashboard</title>
              <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
              <style>
                  body {
                      margin:0;
                      font-family: 'Segoe UI', sans-serif;
                      background:#0f172a;
                      color:#e2e8f0;
                  }
                  header {
                      padding:30px;
                      font-size:24px;
                      font-weight:600;
                  }
                  .container {
                      padding:30px;
                  }
                  .cards {
                      display:grid;
                      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
                      gap:20px;
                      margin-bottom:40px;
                  }
                  .card {
                      background:#1e293b;
                      padding:20px;
                      border-radius:12px;
                      box-shadow:0 0 20px rgba(0,0,0,.3);
                  }
                  .card h2 {
                      margin:0;
                      font-size:14px;
                      color:#94a3b8;
                  }
                  .card p {
                      margin:10px 0 0 0;
                      font-size:28px;
                      font-weight:bold;
                  }
                  .green { color:#22c55e; }
                  .red { color:#ef4444; }
                  .blue { color:#38bdf8; }
                  .orange { color:#f97316; }
                  .section {
                      margin-top:50px;
                  }
                  table {
                      width:100%;
                      border-collapse: collapse;
                  }
                  table tr {
                      border-bottom:1px solid #1e293b;
                  }
                  table td {
                      padding:10px;
                  }
                  .badge-ok { color:#22c55e; }
                  .badge-fail { color:#ef4444; }
              </style>
          </head>
          <body>
              <header>API Quality Dashboard</header>
              <div class="container">

                  <div class="cards">
                      <div class="card">
                          <h2>PASSOU</h2>
                          <p class="green" id="passed">-</p>
                      </div>
                      <div class="card">
                          <h2>FALHOU</h2>
                          <p class="red" id="failed">-</p>
                      </div>
                      <div class="card">
                          <h2>TOTAL</h2>
                          <p class="blue" id="total">-</p>
                      </div>
                      <div class="card">
                          <h2>TAXA DE SUCESSO</h2>
                          <p class="orange" id="success">-</p>
                      </div>
                  </div>

                  <div class="section">
                      <canvas id="chart"></canvas>
                  </div>

                  <div class="section">
                      <h3>Histórico de Execuções</h3>
                      <table id="history"></table>
                  </div>

              </div>

              <script>
                  fetch('history.json')
                  .then(r=>r.json())
                  .then(data=>{
                      if(!data.length) return;

                      const last = data[data.length-1];

                      document.getElementById("passed").innerText = last.passed;
                      document.getElementById("failed").innerText = last.failed;
                      document.getElementById("total").innerText = last.total;
                      document.getElementById("success").innerText = last.success + "%";

                      const labels = data.map(x=>x.date);
                      const successData = data.map(x=>x.success);

                      new Chart(document.getElementById("chart"),{
                          type:'line',
                          data:{
                              labels:labels,
                              datasets:[{
                                  label:'Taxa de Sucesso (%)',
                                  data:successData,
                                  borderColor:'#22c55e',
                                  tension:.3
                              }]
                          }
                      });

                      let html="";
                      data.slice().reverse().forEach(run=>{
                          const status = run.failed==0 ? 
                              "<span class='badge-ok'>✔ OK</span>" :
                              "<span class='badge-fail'>✖ FALHA</span>";

                          html+=`
                              <tr>
                                  <td>${run.date}</td>
                                  <td>${status}</td>
                                  <td>${run.success}%</td>
                              </tr>
                          `;
                      });

                      document.getElementById("history").innerHTML=html;
                  });
              </script>
          </body>
          </html>
          EOF

      - name: Verificar arquivos antes do deploy
        run: |
          echo "Conteúdo da pasta public:"
          ls -la public

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages